services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sec-selfstorage:latest
    container_name: sec-selfstorage
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./data:/app/data
    environment:
      NODE_ENV: production
      PORT: "4000"
      # Generate a secure 32-byte hex key: openssl rand -hex 32
      SYSTEM_ENCRYPTION_KEY: ${SYSTEM_ENCRYPTION_KEY:?SYSTEM_ENCRYPTION_KEY must be set}
      # Generate a secure session secret: openssl rand -hex 32
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      # WebAuthn Relying Party settings
      RP_ID: ${RP_ID:-localhost}
      RP_NAME: ${RP_NAME:-SecSelfStorage}
      RP_ORIGIN: ${RP_ORIGIN:-http://localhost:4000}
      # Data directory (inside container)
      DATA_DIR: /app/data
    networks:
      - selfstorage-net

networks:
  selfstorage-net:
    driver: bridge
